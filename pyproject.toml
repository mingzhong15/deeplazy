[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "dlazy"
version = "2.10.0"
description = "Material calculation workflow automation system"
requires-python = ">=3.8"
dependencies = [
    "pyyaml>=6.0",
    "h5py>=3.0",
]

[project.scripts]
dlazy = "dlazy.cli:main"

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["dlazy*"]
